<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amanda the Adventurer</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0a0808; }
    #vhsCrosshair {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,215,150,0.3);
      font-size: 13px;
      letter-spacing: 2px;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 0 20px rgba(255,215,150,0.05);
      display: block;
      font-family: 'Segoe UI', sans-serif;
    }
    #vhsCrosshair span {
      display: inline-block;
      background: rgba(0,0,0,0.4);
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,215,150,0.05);
    }
  </style>
</head>
<body>
  <div id="vhsCrosshair"><span>📼 CLICK EN TV O CINTA</span></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    
    // --- UI ---
    const crosshairEl = document.getElementById('vhsCrosshair');
    
    // --- ESCENA ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0808);
    
    // --- CÁMARA ---
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 20);
    camera.position.set(0, 0.9, 3.2);
    camera.lookAt(0, 0.35, -0.1);
    
    // --- RENDERER ---
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);
    
    // --- RAYCASTER ---
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    
    // --- LUCES ---
    const ambient = new THREE.AmbientLight(0x222244, 0.15);
    scene.add(ambient);
    
    const spot = new THREE.SpotLight(0xffaa55, 2.0);
    spot.position.set(0, 2.8, -0.2);
    spot.angle = 0.5;
    spot.penumbra = 0.6;
    spot.decay = 1.2;
    spot.distance = 10;
    spot.castShadow = true;
    spot.shadow.mapSize.width = 2048;
    spot.shadow.mapSize.height = 2048;
    spot.shadow.bias = -0.002;
    scene.add(spot);
    
    const fill = new THREE.DirectionalLight(0x4488cc, 0.15);
    fill.position.set(-1, 0.5, 1);
    scene.add(fill);
    
    const rim = new THREE.DirectionalLight(0x446688, 0.1);
    rim.position.set(0, 0.5, -2);
    scene.add(rim);
    
    // --- FOCO DECORATIVO ---
    const cable = new THREE.Mesh(
      new THREE.CylinderGeometry(0.012, 0.012, 0.9, 6),
      new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 })
    );
    cable.position.set(0, 2.25, -0.2);
    scene.add(cable);
    
    const shade = new THREE.Mesh(
      new THREE.CylinderGeometry(0.12, 0.32, 0.28, 20),
      new THREE.MeshStandardMaterial({ 
        color: 0x222222, roughness: 0.3, metalness: 0.8,
        emissive: 0x1a0a00, emissiveIntensity: 0.05
      })
    );
    shade.position.set(0, 2.5, -0.2);
    shade.rotation.x = 0.08;
    scene.add(shade);
    
    const bulb = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 12, 12),
      new THREE.MeshStandardMaterial({ 
        color: 0xffaa44, emissive: 0xff8822, emissiveIntensity: 1.2,
        transparent: true, opacity: 0.95
      })
    );
    bulb.position.set(0, 2.35, -0.2);
    scene.add(bulb);
    
    function createGlow() {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      grad.addColorStop(0, 'rgba(255,200,120,1)');
      grad.addColorStop(0.2, 'rgba(255,180,80,0.8)');
      grad.addColorStop(0.6, 'rgba(255,140,40,0.3)');
      grad.addColorStop(1, 'rgba(255,80,20,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 128, 128);
      return canvas;
    }
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(createGlow()),
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      opacity: 0.5
    }));
    glow.scale.set(1.2, 1.2, 1);
    glow.position.set(0, 2.35, -0.2);
    scene.add(glow);
    
    // --- SUELO ---
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 5),
      new THREE.MeshStandardMaterial({ color: 0x14100e, roughness: 0.9, metalness: 0.05 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.set(0, -0.05, -0.2);
    floor.receiveShadow = true;
    scene.add(floor);
    
    // --- PARED ---
    const wall = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 3.5),
      new THREE.MeshStandardMaterial({ color: 0x0d0a08, roughness: 0.95, metalness: 0 })
    );
    wall.position.set(0, 0.85, -2.0);
    wall.receiveShadow = true;
    scene.add(wall);
    
    // ============================================================
    // TV MEJORADA PARA REPRODUCCIÓN DE VIDEOS
    // ============================================================
    const tvGroup = new THREE.Group();
    tvGroup.position.set(-0.35, 0.28, -0.1);
    
    // Cuerpo principal de la TV (más detallado)
    const bodyMat = new THREE.MeshStandardMaterial({ 
      color: 0x1a1a1a, 
      roughness: 0.3, 
      metalness: 0.6 
    });
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.56, 0.22), bodyMat);
    body.position.z = 0.02;
    body.castShadow = true;
    body.receiveShadow = true;
    tvGroup.add(body);
    
    // Marco frontal
    const frameMat = new THREE.MeshStandardMaterial({ 
      color: 0x222222, 
      roughness: 0.2, 
      metalness: 0.5 
    });
    const frame = new THREE.Mesh(new THREE.BoxGeometry(0.66, 0.48, 0.05), frameMat);
    frame.position.set(0, 0.01, 0.13);
    frame.castShadow = true;
    tvGroup.add(frame);
    
    // Panel de la pantalla (donde se renderiza el video)
    const screenMat = new THREE.MeshStandardMaterial({ 
      color: 0x000000,
      roughness: 0.05,
      metalness: 0.95,
      side: THREE.DoubleSide,
      emissive: 0x000000,
      emissiveIntensity: 0
    });
    const tvScreen = new THREE.Mesh(new THREE.PlaneGeometry(0.58, 0.40), screenMat);
    tvScreen.position.set(0, 0.01, 0.155);
    tvScreen.castShadow = false;
    tvGroup.add(tvScreen);
    
    // Efecto de vidrio/reflejo
    const glassMat = new THREE.MeshStandardMaterial({
      color: 0x88ccff,
      emissive: 0x4488ff,
      emissiveIntensity: 0.03,
      transparent: true,
      opacity: 0.08,
      roughness: 0.0,
      metalness: 1.0,
      side: THREE.DoubleSide
    });
    const glass = new THREE.Mesh(new THREE.PlaneGeometry(0.56, 0.38), glassMat);
    glass.position.set(0, 0.01, 0.165);
    tvGroup.add(glass);
    
    // Luz de la TV (efecto de iluminación)
    const tvLight = new THREE.PointLight(0x4488ff, 0.3, 1.5);
    tvLight.position.set(0, 0.01, 0.4);
    tvGroup.add(tvLight);
    
    // Base con más detalle
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.4, metalness: 0.3 });
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.16, 0.05, 20), baseMat);
    base.position.set(0, -0.30, 0.04);
    base.castShadow = true;
    base.receiveShadow = true;
    tvGroup.add(base);
    
    // Botones frontales
    const btnMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5 });
    for (let i = 0; i < 3; i++) {
      const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.015, 8), btnMat);
      btn.position.set(-0.25 + i * 0.06, -0.24, 0.145);
      btn.rotation.x = Math.PI / 2;
      tvGroup.add(btn);
    }
    
    // LED de encendido
    const ledMat = new THREE.MeshStandardMaterial({
      color: 0x00ff44,
      emissive: 0x00ff44,
      emissiveIntensity: 0.4
    });
    const led = new THREE.Mesh(new THREE.SphereGeometry(0.01, 8, 8), ledMat);
    led.position.set(0.26, -0.24, 0.145);
    tvGroup.add(led);
    
    scene.add(tvGroup);
    
    // ============================================================
    // CINTA VHS EN EL SUELO
    // ============================================================
    const vhsGroup = new THREE.Group();
    vhsGroup.position.set(0.7, 0.05, 0.08);
    scene.add(vhsGroup);
    
    const loader = new GLTFLoader();
    let vhsModel = null;
    let modeloCargado = false;
    
    loader.load(
      'vhs_tape.glb',
      (gltf) => {
        vhsModel = gltf.scene;
        vhsModel.scale.set(1.8, 1.8, 1.8);
        vhsModel.position.set(0, 0, 0);
        vhsModel.castShadow = true;
        vhsModel.receiveShadow = true;
        vhsGroup.add(vhsModel);
        modeloCargado = true;
        console.log('✅ Modelo VHS cargado');
      },
      undefined,
      () => {
        console.warn('⚠️ Usando modelo alternativo');
        const altMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.6, metalness: 0.1 });
        const altBody = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.45, 0.22), altMat);
        altBody.position.y = 0.22;
        altBody.castShadow = true;
        altBody.receiveShadow = true;
        vhsGroup.add(altBody);
        
        const labelMat = new THREE.MeshStandardMaterial({ color: 0x8a6e4b, roughness: 0.8 });
        const label = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.28, 0.02), labelMat);
        label.position.set(0, 0.22, 0.12);
        vhsGroup.add(label);
      }
    );
    
    // ============================================================
    // CINTA EN LA MANO (CUANDO SE RECOGE)
    // ============================================================
    const handVHSGroup = new THREE.Group();
    handVHSGroup.position.set(0.35, 0.2, 0.35);
    handVHSGroup.visible = false;
    scene.add(handVHSGroup);
    
    loader.load(
      'vhs_tape.glb',
      (gltf) => {
        const handModel = gltf.scene;
        handModel.scale.set(1.2, 1.2, 1.2);
        handModel.position.set(0, 0, 0);
        handModel.rotation.x = -0.3;
        handModel.rotation.z = 0.2;
        handVHSGroup.add(handModel);
      },
      undefined,
      () => {
        const altMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.6, metalness: 0.1 });
        const altBody = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.35, 0.18), altMat);
        altBody.position.y = 0.18;
        handVHSGroup.add(altBody);
      }
    );
    
    // ============================================================
    // SISTEMA DE VIDEO
    // ============================================================
    
    let videoElement = null;
    let videoTexture = null;
    let isPlaying = false;
    let isWatching = false;
    let hasVHS = false;
    let cameraAnimating = false;
    let camAnimTime = 0;
    let camStartPos = new THREE.Vector3();
    let camEndPos = new THREE.Vector3();
    let camStartTarget = new THREE.Vector3();
    let camEndTarget = new THREE.Vector3();
    let isReturning = false;
    let animacionCintaActiva = false;
    let tiempoCintaAnim = 0;
    let cintaPosInicial = new THREE.Vector3();
    let cintaPosFinal = new THREE.Vector3();
    let cintaDesaparecida = false;
    
    // Crear elemento de video
    function createVideoElement(src, loop = true) {
        const video = document.createElement('video');
        video.src = src;
        video.crossOrigin = 'anonymous';
        video.playsInline = true;
        video.muted = false;
        video.loop = loop;
        video.volume = 0.5;
        video.style.display = 'none';
        document.body.appendChild(video);
        return video;
    }
    
    // Aplicar video a la pantalla de la TV
    function setTVScreen(video) {
        if (videoTexture) {
            videoTexture.dispose();
        }
        videoTexture = new THREE.VideoTexture(video);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;
    
        tvScreen.material = new THREE.MeshStandardMaterial({
            map: videoTexture,
            emissive: new THREE.Color(0x4488ff),
            emissiveIntensity: 0.35,
            roughness: 0.1,
            metalness: 0.9,
            side: THREE.DoubleSide
        });
    
        tvLight.intensity = 1.5;
        isPlaying = true;
    }
    
    // Screen.mp4 - loop infinito
    function playScreenLoop() {
        if (videoElement) {
            videoElement.pause();
            videoElement.currentTime = 0;
            videoElement = null;
        }
        videoElement = createVideoElement('videos/Screen.mp4', true);
        setTVScreen(videoElement);
        videoElement.play().catch(() => {});
        crosshairEl.style.display = 'block';
    }
    
    // NoIn.mp4 - una vez, luego vuelve a Screen.mp4
    function playNoIn() {
        if (videoElement) {
            videoElement.pause();
            videoElement.currentTime = 0;
            videoElement = null;
        }
        videoElement = createVideoElement('videos/NoIn.mp4', false);
        setTVScreen(videoElement);
        
        videoElement.addEventListener('ended', function onEnd() {
            videoElement.removeEventListener('ended', onEnd);
            startCameraReturn();
            setTimeout(() => {
                playScreenLoop();
            }, 300);
        });
        
        videoElement.play().catch(() => { startCameraReturn(); playScreenLoop(); });
    }
    
    // Tutoriall.mp4 - una vez, luego vuelve a Screen.mp4
    function playTutorial() {
        if (videoElement) {
            videoElement.pause();
            videoElement.currentTime = 0;
            videoElement = null;
        }
        videoElement = createVideoElement('videos/Tutoriall.mp4', false);
        setTVScreen(videoElement);
        
        videoElement.addEventListener('ended', function onEnd() {
            videoElement.removeEventListener('ended', onEnd);
            isWatching = false;
            crosshairEl.style.display = 'block';
            startCameraReturn();
            setTimeout(() => {
                playScreenLoop();
            }, 300);
            if (hasVHS) {
                handVHSGroup.visible = true;
            }
        });
        
        videoElement.play().catch(() => { playScreenLoop(); });
    }
    
    // Iniciar con Screen.mp4
    setTimeout(playScreenLoop, 500);
    
    // ============================================================
    // ANIMACIÓN DE CÁMARA
    // ============================================================
    
    function animateCameraTo(targetPos, targetLook, duration = 1.2) {
        cameraAnimating = true;
        camAnimTime = 0;
        camStartPos.copy(camera.position);
        camEndPos.copy(targetPos);
        camStartTarget.copy(getCameraTarget());
        camEndTarget.copy(targetLook);
        isReturning = false;
    }
    
    function getCameraTarget() {
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        return camera.position.clone().add(dir.multiplyScalar(2));
    }
    
    function startCameraReturn() {
        if (cameraAnimating) return;
        isReturning = true;
        cameraAnimating = true;
        camAnimTime = 0;
        camStartPos.copy(camera.position);
        camEndPos.set(0, 0.9, 3.2);
        camStartTarget.copy(getCameraTarget());
        camEndTarget.set(0, 0.35, -0.1);
    }
    
    function updateCameraAnimation(delta) {
        if (!cameraAnimating) return;
        
        camAnimTime += delta;
        const duration = isReturning ? 0.8 : 1.2;
        let progress = Math.min(camAnimTime / duration, 1);
        const ease = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
        
        camera.position.lerpVectors(camStartPos, camEndPos, ease);
        const target = new THREE.Vector3().lerpVectors(camStartTarget, camEndTarget, ease);
        camera.lookAt(target);
        
        if (progress >= 1) {
            cameraAnimating = false;
            if (isReturning) {
                isReturning = false;
                if (!isWatching) {
                    crosshairEl.style.display = 'block';
                }
            }
        }
    }
    
    // ============================================================
    // ANIMACIÓN DE LA CINTA (CUANDO SE CLICKEA)
    // ============================================================
    
    function iniciarAnimacionCinta() {
        if (animacionCintaActiva || !hasVHS) return;
        if (isWatching) return;
        
        animacionCintaActiva = true;
        tiempoCintaAnim = 0;
        cintaDesaparecida = false;
        
        // Guardar posiciones
        cintaPosInicial.copy(handVHSGroup.position);
        cintaPosFinal.set(-0.15, 0.28, 0.08);
        
        // Ocultar la cinta de la mano
        handVHSGroup.visible = false;
        
        // Mostrar la cinta en el suelo (si estaba oculta)
        vhsGroup.visible = true;
        vhsGroup.position.set(0.7, 0.05, 0.08);
    }
    
    function actualizarAnimacionCinta(delta) {
        if (!animacionCintaActiva) return;
        
        tiempoCintaAnim += delta;
        const duracion = 1.2;
        let progreso = Math.min(tiempoCintaAnim / duracion, 1);
        const ease = progreso < 0.5 ? 2 * progreso * progreso : 1 - Math.pow(-2 * progreso + 2, 2) / 2;
        
        if (progreso < 1) {
            // Mover la cinta desde la mano hacia la TV
            const posCinta = new THREE.Vector3().lerpVectors(
                new THREE.Vector3(0.35, 0.2, 0.35),
                cintaPosFinal,
                ease
            );
            vhsGroup.position.copy(posCinta);
            vhsGroup.rotation.y = ease * 0.4;
        } else {
            // Llegó a la TV
            vhsGroup.position.copy(cintaPosFinal);
            vhsGroup.rotation.y = 0.4;
            
            // Después de 0.5 segundos, desaparecer la cinta
            if (!cintaDesaparecida) {
                setTimeout(() => {
                    vhsGroup.visible = false;
                    cintaDesaparecida = true;
                    
                    // Reproducir Tutorial
                    isWatching = true;
                    crosshairEl.style.display = 'none';
                    playTutorial();
                    
                    animacionCintaActiva = false;
                }, 500);
            }
        }
    }
    
    // ============================================================
    // INTERACCIÓN CON LA TV
    // ============================================================
    
    renderer.domElement.addEventListener('click', (e) => {
        if (cameraAnimating) return;
        if (isWatching) return;
        if (animacionCintaActiva) return;
        
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        
        raycaster.setFromCamera(pointer, camera);
        
        const tvMeshes = [];
        tvGroup.children.forEach(child => {
            if (child.isMesh) tvMeshes.push(child);
        });
        
        const tvIntersects = raycaster.intersectObjects(tvMeshes);
        if (tvIntersects.length > 0) {
            // Animar cámara hacia la TV
            animateCameraTo(
                new THREE.Vector3(-0.35, 0.6, 1.3),
                new THREE.Vector3(-0.35, 0.28, -0.1)
            );
            
            if (hasVHS) {
                // Si tiene cinta, iniciar animación de inserción
                setTimeout(() => {
                    iniciarAnimacionCinta();
                }, 500);
            } else {
                // Sin cinta, reproducir NoIn.mp4
                setTimeout(() => {
                    playNoIn();
                }, 500);
            }
        }
    });
    
    // ============================================================
    // INTERACCIÓN CON LA CINTA VHS (RECOGER)
    // ============================================================
    
    renderer.domElement.addEventListener('click', (e) => {
        if (cameraAnimating) return;
        if (isWatching) return;
        if (hasVHS) return;
        if (animacionCintaActiva) return;
        
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        
        raycaster.setFromCamera(pointer, camera);
        
        const vhsMeshes = [];
        vhsGroup.children.forEach(child => {
            if (child.isMesh) vhsMeshes.push(child);
            child.children?.forEach(gc => {
                if (gc.isMesh) vhsMeshes.push(gc);
            });
        });
        
        const vhsIntersects = raycaster.intersectObjects(vhsMeshes);
        if (vhsIntersects.length > 0) {
            hasVHS = true;
            vhsGroup.visible = false;
            handVHSGroup.visible = true;
        }
    });
    
    // ============================================================
    // SALIR DEL MODO TUTORIAL (ESC)
    // ============================================================
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && isWatching) {
            isWatching = false;
            crosshairEl.style.display = 'block';
            if (videoElement) {
                videoElement.pause();
                videoElement.currentTime = 0;
            }
            startCameraReturn();
            setTimeout(() => {
                playScreenLoop();
            }, 300);
            if (hasVHS) {
                handVHSGroup.visible = true;
            }
            animacionCintaActiva = false;
            vhsGroup.visible = true;
            vhsGroup.position.set(0.7, 0.05, 0.08);
        }
    });
    
    // ============================================================
    // LOOP PRINCIPAL
    // ============================================================
    
    const clock = new THREE.Clock();
    
    function animate() {
        const delta = clock.getDelta();
        
        if (cameraAnimating) {
            updateCameraAnimation(delta);
        } else if (animacionCintaActiva) {
            actualizarAnimacionCinta(delta);
        } else {
            if (!isWatching && !cameraAnimating) {
                camera.position.set(0, 0.9, 3.2);
                camera.lookAt(0, 0.35, -0.1);
            }
        }
        
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    
    animate();
    
    // --- RESIZE ---
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    console.log('🎬 Amanda the Adventurer - VHS System');
    console.log('📼 Click en la TV o en la cinta VHS para interactuar');
  </script>
</body>
</html>
