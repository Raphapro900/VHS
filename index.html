<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amanda the Adventurer</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0a0808; }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0808);
    
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 20);
    camera.position.set(0, 0.9, 3.2);
    camera.lookAt(0, 0.35, -0.1);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);
    
    // Luces
    const ambient = new THREE.AmbientLight(0x222244, 0.15);
    scene.add(ambient);
    
    const spot = new THREE.SpotLight(0xffaa55, 2.0);
    spot.position.set(0, 2.8, -0.2);
    spot.angle = 0.5;
    spot.penumbra = 0.6;
    spot.decay = 1.2;
    spot.distance = 10;
    spot.castShadow = true;
    spot.shadow.mapSize.width = 2048;
    spot.shadow.mapSize.height = 2048;
    spot.shadow.bias = -0.002;
    scene.add(spot);
    
    const fill = new THREE.DirectionalLight(0x4488cc, 0.15);
    fill.position.set(-1, 0.5, 1);
    scene.add(fill);
    
    const rim = new THREE.DirectionalLight(0x446688, 0.1);
    rim.position.set(0, 0.5, -2);
    scene.add(rim);
    
    // Foco decorativo
    const cable = new THREE.Mesh(
      new THREE.CylinderGeometry(0.012, 0.012, 0.9, 6),
      new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 })
    );
    cable.position.set(0, 2.25, -0.2);
    scene.add(cable);
    
    const shade = new THREE.Mesh(
      new THREE.CylinderGeometry(0.12, 0.32, 0.28, 20),
      new THREE.MeshStandardMaterial({ 
        color: 0x222222, roughness: 0.3, metalness: 0.8,
        emissive: 0x1a0a00, emissiveIntensity: 0.05
      })
    );
    shade.position.set(0, 2.5, -0.2);
    shade.rotation.x = 0.08;
    scene.add(shade);
    
    const bulb = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 12, 12),
      new THREE.MeshStandardMaterial({ 
        color: 0xffaa44, emissive: 0xff8822, emissiveIntensity: 1.2,
        transparent: true, opacity: 0.95
      })
    );
    bulb.position.set(0, 2.35, -0.2);
    scene.add(bulb);
    
    function createGlow() {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      grad.addColorStop(0, 'rgba(255,200,120,1)');
      grad.addColorStop(0.2, 'rgba(255,180,80,0.8)');
      grad.addColorStop(0.6, 'rgba(255,140,40,0.3)');
      grad.addColorStop(1, 'rgba(255,80,20,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 128, 128);
      return canvas;
    }
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(createGlow()),
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      opacity: 0.5
    }));
    glow.scale.set(1.2, 1.2, 1);
    glow.position.set(0, 2.35, -0.2);
    scene.add(glow);
    
    // Suelo
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 5),
      new THREE.MeshStandardMaterial({ color: 0x14100e, roughness: 0.9, metalness: 0.05 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.set(0, -0.05, -0.2);
    floor.receiveShadow = true;
    scene.add(floor);
    
    // Pared
    const wall = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 3.5),
      new THREE.MeshStandardMaterial({ color: 0x0d0a08, roughness: 0.95, metalness: 0 })
    );
    wall.position.set(0, 0.85, -2.0);
    wall.receiveShadow = true;
    scene.add(wall);
    
    // --- TV ---
    const tvGroup = new THREE.Group();
    tvGroup.position.set(-0.35, 0.28, -0.1);
    
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x181818, roughness: 0.4, metalness: 0.5 });
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.52, 0.2), bodyMat);
    body.position.z = 0.02;
    body.castShadow = true;
    body.receiveShadow = true;
    tvGroup.add(body);
    
    const frameMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.4 });
    const frame = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.45, 0.03), frameMat);
    frame.position.set(0, 0.01, 0.13);
    frame.castShadow = true;
    tvGroup.add(frame);
    
    // Pantalla con brillo para realismo
    const screenMat = new THREE.MeshStandardMaterial({ 
      color: 0x050508, 
      emissive: 0x111122, 
      emissiveIntensity: 0.05,
      roughness: 0.05,
      metalness: 0.95,
      envMapIntensity: 1.5
    });
    const screenMesh = new THREE.Mesh(new THREE.BoxGeometry(0.56, 0.39, 0.02), screenMat);
    screenMesh.position.set(0, 0.01, 0.15);
    screenMesh.castShadow = false;
    tvGroup.add(screenMesh);
    
    // Brillo de la pantalla (reflejo)
    const brilloMat = new THREE.MeshStandardMaterial({
      color: 0x88bbff,
      emissive: 0x4488ff,
      emissiveIntensity: 0.02,
      transparent: true,
      opacity: 0.08,
      roughness: 0.0,
      metalness: 1.0,
      side: THREE.DoubleSide
    });
    const brillo = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.34), brilloMat);
    brillo.position.set(0, 0.01, 0.16);
    brillo.rotation.y = 0;
    tvGroup.add(brillo);
    
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5, metalness: 0.3 });
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.10, 0.14, 0.04, 16), baseMat);
    base.position.set(0, -0.28, 0.04);
    base.castShadow = true;
    base.receiveShadow = true;
    tvGroup.add(base);
    
    const btnMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.6 });
    for (let i = 0; i < 3; i++) {
      const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.02, 8), btnMat);
      btn.position.set(-0.24 + i * 0.06, -0.23, 0.14);
      btn.rotation.x = Math.PI / 2;
      tvGroup.add(btn);
    }
    scene.add(tvGroup);
    
    // --- Cinta VHS (más grande) ---
    const cintaGroup = new THREE.Group();
    cintaGroup.position.set(0.7, 0.15, 0.08);
    scene.add(cintaGroup);
    
    const loader = new GLTFLoader();
    let cintaModel = null;
    
    loader.load(
      'vhs_tape.glb',
      (gltf) => {
        cintaModel = gltf.scene;
        cintaModel.scale.set(1.2, 1.2, 1.2); // Más grande
        cintaModel.position.y = 0.15;
        cintaModel.castShadow = true;
        cintaModel.receiveShadow = true;
        cintaGroup.add(cintaModel);
        console.log('✅ Modelo VHS cargado');
      },
      undefined,
      () => {
        console.warn('⚠️ Usando modelo alternativo');
        const altMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.6, metalness: 0.1 });
        const altBody = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.40, 0.20), altMat);
        altBody.castShadow = true;
        altBody.receiveShadow = true;
        cintaGroup.add(altBody);
        
        const labelMat = new THREE.MeshStandardMaterial({ color: 0x8a6e4b, roughness: 0.8 });
        const label = new THREE.Mesh(new THREE.BoxGeometry(0.20, 0.24, 0.02), labelMat);
        label.position.set(0, 0.02, 0.11);
        cintaGroup.add(label);
      }
    );
    
    // --- Videos ---
    function crearVideo(src, loop = false) {
      const v = document.createElement('video');
      v.src = src;
      v.loop = loop;
      v.muted = true;
      v.playsInline = true;
      v.crossOrigin = 'anonymous';
      v.style.display = 'none';
      document.body.appendChild(v);
      return v;
    }
    
    const vidScreen = crearVideo('videos/Screen.mp4', true);
    const vidNoIn = crearVideo('videos/NoIn.mp4', false);
    const vidTutorial = crearVideo('videos/Tutoriall.mp4', false);
    
    // Textura inicial con Screen.mp4 en loop
    const texScreen = new THREE.VideoTexture(vidScreen);
    texScreen.minFilter = THREE.LinearFilter;
    texScreen.magFilter = THREE.LinearFilter;
    screenMesh.material = new THREE.MeshStandardMaterial({
      map: texScreen,
      emissive: new THREE.Color(0x224466),
      emissiveIntensity: 0.15,
      roughness: 0.1,
      metalness: 0.9,
      side: THREE.DoubleSide
    });
    
    // Reproducir Screen.mp4 en loop automáticamente
    vidScreen.play().catch(() => console.log('Autoplay bloqueado, esperando interacción'));
    
    let videoActual = vidScreen;
    let videoActualLoop = true;
    
    function cambiarVideo(video, loop = false) {
      // Pausar video anterior
      if (videoActual && videoActual !== video) {
        videoActual.pause();
        videoActual.currentTime = 0;
      }
      videoActual = video;
      videoActualLoop = loop;
      videoActual.loop = loop;
      
      const nuevaTex = new THREE.VideoTexture(videoActual);
      nuevaTex.minFilter = THREE.LinearFilter;
      nuevaTex.magFilter = THREE.LinearFilter;
      screenMesh.material.map = nuevaTex;
      screenMesh.material.needsUpdate = true;
      
      // Actualizar brillo según el video
      brillo.material.emissiveIntensity = loop ? 0.02 : 0.06;
      
      videoActual.play().catch(() => console.log('Error reproduciendo video'));
    }
    
    // --- Estado ---
    let animando = false;
    let tiempoAnim = 0;
    let tiempoCintaVisible = 0;
    let cintaDesaparecida = false;
    let esperandoFinVideo = false;
    let tipoAnimacion = null; // 'tv' o 'cinta'
    
    const camIni = new THREE.Vector3(0, 0.9, 3.2);
    const objIni = new THREE.Vector3(0, 0.35, -0.1);
    let camObj = new THREE.Vector3();
    let objObj = new THREE.Vector3();
    const cintaPosIni = new THREE.Vector3(0.7, 0.15, 0.08);
    const cintaPosFin = new THREE.Vector3(-0.15, 0.28, 0.08);
    
    function animTV() {
      if (animando) return;
      animando = true;
      tiempoAnim = 0;
      tipoAnimacion = 'tv';
      esperandoFinVideo = false;
      camObj.set(-0.35, 0.6, 1.3);
      objObj.set(-0.35, 0.28, -0.1);
      cambiarVideo(vidNoIn, false);
      cintaGroup.visible = true;
      cintaDesaparecida = false;
    }
    
    function animCinta() {
      if (animando) return;
      animando = true;
      tiempoAnim = 0;
      tiempoCintaVisible = 0;
      tipoAnimacion = 'cinta';
      esperandoFinVideo = false;
      cintaGroup.position.copy(cintaPosIni);
      cintaGroup.visible = true;
      cintaDesaparecida = false;
      cambiarVideo(vidTutorial, false);
      camObj.set(-0.35, 0.6, 1.1);
      objObj.set(-0.35, 0.28, -0.1);
    }
    
    function actualizarAnim(delta) {
      if (!animando) return;
      
      tiempoAnim += delta;
      const dur = 1.2;
      let prog = Math.min(tiempoAnim / dur, 1);
      const ease = prog < 0.5 ? 2 * prog * prog : 1 - Math.pow(-2 * prog + 2, 2) / 2;
      
      if (tipoAnimacion === 'tv') {
        // Animación de cámara para TV
        if (prog < 1) {
          camera.position.lerpVectors(camIni, camObj, ease);
          const target = new THREE.Vector3().lerpVectors(objIni, objObj, ease);
          camera.lookAt(target);
        } else {
          camera.position.copy(camObj);
          camera.lookAt(objObj);
          
          // Esperar a que termine NoIn.mp4
          if (videoActual && !videoActual.loop && videoActual.ended) {
            regresarCamara();
          }
        }
      } else if (tipoAnimacion === 'cinta') {
        // Animación de cinta + cámara
        if (prog < 1) {
          const posCinta = new THREE.Vector3().lerpVectors(cintaPosIni, cintaPosFin, ease);
          cintaGroup.position.copy(posCinta);
          if (cintaModel) {
            cintaModel.rotation.y = ease * 0.4;
          } else {
            cintaGroup.rotation.y = ease * 0.4;
          }
          
          camera.position.lerpVectors(camIni, camObj, ease);
          const target = new THREE.Vector3().lerpVectors(objIni, objObj, ease);
          camera.lookAt(target);
        } else {
          cintaGroup.position.copy(cintaPosFin);
          if (cintaModel) {
            cintaModel.rotation.y = 0.4;
          } else {
            cintaGroup.rotation.y = 0.4;
          }
          camera.position.copy(camObj);
          camera.lookAt(objObj);
          
          // Después de 1 segundo, desaparecer la cinta
          if (!cintaDesaparecida) {
            tiempoCintaVisible += delta;
            if (tiempoCintaVisible >= 1.0) {
              cintaGroup.visible = false;
              cintaDesaparecida = true;
            }
          }
          
          // Esperar a que termine Tutoriall.mp4
          if (videoActual && !videoActual.loop && videoActual.ended) {
            // Cerrar página
            window.close();
            setTimeout(() => { window.location.href = 'about:blank'; }, 300);
            return;
          }
        }
      }
    }
    
    function regresarCamara() {
      const posIni = camera.position.clone();
      const targetIni = new THREE.Vector3(0, 0.35, -0.1);
      const posFin = camIni.clone();
      const targetFin = objIni.clone();
      
      let tiempo = 0;
      const dur = 0.8;
      
      function animar() {
        tiempo += 0.02;
        let p = Math.min(tiempo / dur, 1);
        const ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
        camera.position.lerpVectors(posIni, posFin, ease);
        const target = new THREE.Vector3().lerpVectors(targetIni, targetFin, ease);
        camera.lookAt(target);
        
        if (p < 1) {
          requestAnimationFrame(animar);
        } else {
          camera.position.copy(posFin);
          camera.lookAt(targetFin);
          animando = false;
          tipoAnimacion = null;
          // Volver a Screen.mp4 en loop
          cambiarVideo(vidScreen, true);
          cintaGroup.position.copy(cintaPosIni);
          if (cintaModel) {
            cintaModel.rotation.y = 0;
          } else {
            cintaGroup.rotation.y = 0;
          }
          cintaGroup.visible = true;
          cintaDesaparecida = false;
        }
      }
      animar();
    }
    
    // --- Interacción ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    
    function onClick(event) {
      if (animando) return;
      
      mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
      mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      
      const tvMeshes = [];
      tvGroup.children.forEach(child => {
        if (child.isMesh) tvMeshes.push(child);
      });
      
      const cintaMeshes = [];
      cintaGroup.children.forEach(child => {
        if (child.isMesh) cintaMeshes.push(child);
        child.children?.forEach(gc => {
          if (gc.isMesh) cintaMeshes.push(gc);
        });
      });
      
      const all = [...tvMeshes, ...cintaMeshes];
      const hits = raycaster.intersectObjects(all);
      
      if (hits.length > 0) {
        let esTV = false;
        let esCinta = false;
        let obj = hits[0].object;
        while (obj) {
          if (obj === tvGroup) { esTV = true; break; }
          if (obj === cintaGroup) { esCinta = true; break; }
          obj = obj.parent;
        }
        
        if (esTV) {
          animTV();
        } else if (esCinta) {
          animCinta();
        }
      }
    }
    
    window.addEventListener('click', onClick);
    
    // --- Loop ---
    const clock = new THREE.Clock();
    
    function animate() {
      const delta = clock.getDelta();
      
      if (animando) {
        actualizarAnim(delta);
      } else {
        camera.position.copy(camIni);
        camera.lookAt(objIni);
      }
      
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    
    animate();
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
