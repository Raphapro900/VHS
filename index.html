<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amanda the Adventurer</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0a0808; font-family: 'Segoe UI', sans-serif; }
    #message {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      background: rgba(0,0,0,0.7);
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 16px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      border: 1px solid rgba(255,215,150,0.2);
      backdrop-filter: blur(4px);
      z-index: 10;
    }
    #message.visible { opacity: 1; }
    #vhsCrosshair {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,215,150,0.4);
      font-size: 14px;
      letter-spacing: 2px;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 0 20px rgba(255,215,150,0.1);
      display: block;
    }
    #vhsCrosshair span {
      display: inline-block;
      background: rgba(0,0,0,0.5);
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,215,150,0.1);
    }
  </style>
</head>
<body>
  <div id="message">📺 Mensaje</div>
  <div id="vhsCrosshair"><span>📼 Click en la TV o la cinta VHS</span></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    
    // --- ELEMENTOS UI ---
    const messageEl = document.getElementById('message');
    const crosshairEl = document.getElementById('vhsCrosshair');
    
    function showMessage(text) {
      messageEl.textContent = text;
      messageEl.classList.add('visible');
      clearTimeout(messageEl._timeout);
      messageEl._timeout = setTimeout(() => {
        messageEl.classList.remove('visible');
      }, 2000);
    }
    
    // --- ESCENA ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0808);
    
    // --- CÁMARA ---
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 20);
    camera.position.set(0, 0.9, 3.2);
    camera.lookAt(0, 0.35, -0.1);
    
    // --- RENDERER ---
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);
    
    // --- RAYCASTER ---
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    
    // --- LUCES ---
    const ambient = new THREE.AmbientLight(0x222244, 0.15);
    scene.add(ambient);
    
    const spot = new THREE.SpotLight(0xffaa55, 2.0);
    spot.position.set(0, 2.8, -0.2);
    spot.angle = 0.5;
    spot.penumbra = 0.6;
    spot.decay = 1.2;
    spot.distance = 10;
    spot.castShadow = true;
    spot.shadow.mapSize.width = 2048;
    spot.shadow.mapSize.height = 2048;
    spot.shadow.bias = -0.002;
    scene.add(spot);
    
    const fill = new THREE.DirectionalLight(0x4488cc, 0.15);
    fill.position.set(-1, 0.5, 1);
    scene.add(fill);
    
    const rim = new THREE.DirectionalLight(0x446688, 0.1);
    rim.position.set(0, 0.5, -2);
    scene.add(rim);
    
    // --- FOCO DECORATIVO ---
    const cable = new THREE.Mesh(
      new THREE.CylinderGeometry(0.012, 0.012, 0.9, 6),
      new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 })
    );
    cable.position.set(0, 2.25, -0.2);
    scene.add(cable);
    
    const shade = new THREE.Mesh(
      new THREE.CylinderGeometry(0.12, 0.32, 0.28, 20),
      new THREE.MeshStandardMaterial({ 
        color: 0x222222, roughness: 0.3, metalness: 0.8,
        emissive: 0x1a0a00, emissiveIntensity: 0.05
      })
    );
    shade.position.set(0, 2.5, -0.2);
    shade.rotation.x = 0.08;
    scene.add(shade);
    
    const bulb = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 12, 12),
      new THREE.MeshStandardMaterial({ 
        color: 0xffaa44, emissive: 0xff8822, emissiveIntensity: 1.2,
        transparent: true, opacity: 0.95
      })
    );
    bulb.position.set(0, 2.35, -0.2);
    scene.add(bulb);
    
    function createGlow() {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      grad.addColorStop(0, 'rgba(255,200,120,1)');
      grad.addColorStop(0.2, 'rgba(255,180,80,0.8)');
      grad.addColorStop(0.6, 'rgba(255,140,40,0.3)');
      grad.addColorStop(1, 'rgba(255,80,20,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 128, 128);
      return canvas;
    }
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(createGlow()),
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      opacity: 0.5
    }));
    glow.scale.set(1.2, 1.2, 1);
    glow.position.set(0, 2.35, -0.2);
    scene.add(glow);
    
    // --- SUELO ---
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 5),
      new THREE.MeshStandardMaterial({ color: 0x14100e, roughness: 0.9, metalness: 0.05 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.set(0, -0.05, -0.2);
    floor.receiveShadow = true;
    scene.add(floor);
    
    // --- PARED ---
    const wall = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 3.5),
      new THREE.MeshStandardMaterial({ color: 0x0d0a08, roughness: 0.95, metalness: 0 })
    );
    wall.position.set(0, 0.85, -2.0);
    wall.receiveShadow = true;
    scene.add(wall);
    
    // --- TV GROUP ---
    const tvGroup = new THREE.Group();
    tvGroup.position.set(-0.35, 0.28, -0.1);
    
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x181818, roughness: 0.4, metalness: 0.5 });
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.52, 0.2), bodyMat);
    body.position.z = 0.02;
    body.castShadow = true;
    body.receiveShadow = true;
    tvGroup.add(body);
    
    const frameMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.4 });
    const frame = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.45, 0.04), frameMat);
    frame.position.set(0, 0.01, 0.13);
    frame.castShadow = true;
    tvGroup.add(frame);
    
    // Pantalla (donde se reproducen los videos)
    const screenMat = new THREE.MeshStandardMaterial({ 
      color: 0x000000,
      roughness: 0.05,
      metalness: 0.95,
      side: THREE.DoubleSide
    });
    const tvScreen = new THREE.Mesh(new THREE.PlaneGeometry(0.56, 0.39), screenMat);
    tvScreen.position.set(0, 0.01, 0.15);
    tvScreen.castShadow = false;
    tvGroup.add(tvScreen);
    
    // Brillo/reflejo de pantalla
    const glassMat = new THREE.MeshStandardMaterial({
      color: 0x88ccff,
      emissive: 0x4488ff,
      emissiveIntensity: 0.02,
      transparent: true,
      opacity: 0.06,
      roughness: 0.0,
      metalness: 1.0,
      side: THREE.DoubleSide
    });
    const glass = new THREE.Mesh(new THREE.PlaneGeometry(0.54, 0.37), glassMat);
    glass.position.set(0, 0.01, 0.16);
    tvGroup.add(glass);
    
    // Luz de la TV (efecto de iluminación)
    const tvLight = new THREE.PointLight(0x4488ff, 0.5, 2);
    tvLight.position.set(0, 0.01, 0.3);
    tvGroup.add(tvLight);
    
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5, metalness: 0.3 });
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.10, 0.14, 0.04, 16), baseMat);
    base.position.set(0, -0.28, 0.04);
    base.castShadow = true;
    base.receiveShadow = true;
    tvGroup.add(base);
    
    const btnMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.6 });
    for (let i = 0; i < 3; i++) {
      const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.02, 8), btnMat);
      btn.position.set(-0.24 + i * 0.06, -0.23, 0.14);
      btn.rotation.x = Math.PI / 2;
      tvGroup.add(btn);
    }
    
    const ledMat = new THREE.MeshStandardMaterial({
      color: 0x00ff44,
      emissive: 0x00ff44,
      emissiveIntensity: 0.3
    });
    const led = new THREE.Mesh(new THREE.SphereGeometry(0.012, 8, 8), ledMat);
    led.position.set(0.22, -0.22, 0.14);
    tvGroup.add(led);
    
    scene.add(tvGroup);
    
    // --- VHS GROUP (cinta en el suelo) ---
    const vhsGroup = new THREE.Group();
    vhsGroup.position.set(0.7, 0.05, 0.08);
    scene.add(vhsGroup);
    
    const loader = new GLTFLoader();
    let vhsModel = null;
    let modeloCargado = false;
    
    loader.load(
      'vhs_tape.glb',
      (gltf) => {
        vhsModel = gltf.scene;
        vhsModel.scale.set(1.8, 1.8, 1.8);
        vhsModel.position.set(0, 0, 0);
        vhsModel.castShadow = true;
        vhsModel.receiveShadow = true;
        vhsGroup.add(vhsModel);
        modeloCargado = true;
        console.log('✅ Modelo VHS cargado');
      },
      undefined,
      () => {
        console.warn('⚠️ Usando modelo alternativo');
        const altMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.6, metalness: 0.1 });
        const altBody = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.45, 0.22), altMat);
        altBody.position.y = 0.22;
        altBody.castShadow = true;
        altBody.receiveShadow = true;
        vhsGroup.add(altBody);
        
        const labelMat = new THREE.MeshStandardMaterial({ color: 0x8a6e4b, roughness: 0.8 });
        const label = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.28, 0.02), labelMat);
        label.position.set(0, 0.22, 0.12);
        vhsGroup.add(label);
      }
    );
    
    // --- VHS EN LA MANO (cuando se recoge) ---
    const handVHSGroup = new THREE.Group();
    handVHSGroup.position.set(0.3, 0.15, 0.3);
    handVHSGroup.visible = false;
    scene.add(handVHSGroup);
    
    // Copiar el modelo cuando se cargue
    loader.load(
      'vhs_tape.glb',
      (gltf) => {
        const handModel = gltf.scene;
        handModel.scale.set(1.2, 1.2, 1.2);
        handModel.position.set(0, 0, 0);
        handModel.rotation.x = -0.3;
        handModel.rotation.z = 0.2;
        handVHSGroup.add(handModel);
      },
      undefined,
      () => {
        const altMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.6, metalness: 0.1 });
        const altBody = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.35, 0.18), altMat);
        altBody.position.y = 0.18;
        handVHSGroup.add(altBody);
      }
    );
    
    // ============================================================
    // SISTEMA DE VIDEO PARA LA TV (VHS)
    // ============================================================
    
    let videoElement = null;
    let videoTexture = null;
    let isPlaying = false;
    let isWatching = false;
    let hasVHS = false;
    let cameraAnimating = false;
    let camAnimTime = 0;
    let camStartPos = new THREE.Vector3();
    let camEndPos = new THREE.Vector3();
    let camStartTarget = new THREE.Vector3();
    let camEndTarget = new THREE.Vector3();
    let isReturning = false;
    
    // Crear elemento de video
    function createVideoElement(src, loop = true) {
        const video = document.createElement('video');
        video.src = src;
        video.crossOrigin = 'anonymous';
        video.playsInline = true;
        video.muted = false;
        video.loop = loop;
        video.volume = 0.5;
        video.style.display = 'none';
        document.body.appendChild(video);
        return video;
    }
    
    // Aplicar video a la pantalla de la TV
    function setTVScreen(video) {
        if (videoTexture) {
            videoTexture.dispose();
        }
        videoTexture = new THREE.VideoTexture(video);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;
    
        tvScreen.material = new THREE.MeshStandardMaterial({
            map: videoTexture,
            emissive: new THREE.Color(0x4488ff),
            emissiveIntensity: 0.3,
            roughness: 0.2,
            metalness: 0.1,
            side: THREE.DoubleSide
        });
    
        tvLight.intensity = 1.5;
        isPlaying = true;
    }
    
    // Reproducir Screen.mp4 en loop (pantalla de inicio)
    function playScreenLoop() {
        if (videoElement) {
            videoElement.pause();
            videoElement.currentTime = 0;
            videoElement = null;
        }
        videoElement = createVideoElement('videos/Screen.mp4', true);
        setTVScreen(videoElement);
        videoElement.play().catch(() => {});
        crosshairEl.style.display = 'block';
    }
    
    // Reproducir NoIn.mp4 (sin cinta)
    function playNoIn() {
        if (videoElement) {
            videoElement.pause();
            videoElement.currentTime = 0;
            videoElement = null;
        }
        videoElement = createVideoElement('videos/NoIn.mp4', false);
        setTVScreen(videoElement);
        
        videoElement.addEventListener('ended', function onEnd() {
            videoElement.removeEventListener('ended', onEnd);
            // Volver a la posición normal de cámara
            startCameraReturn();
        });
        
        videoElement.play().catch(() => { startCameraReturn(); });
    }
    
    // Reproducir Tutoriall.mp4 (con cinta)
    function playTutorial() {
        if (videoElement) {
            videoElement.pause();
            videoElement.currentTime = 0;
            videoElement = null;
        }
        videoElement = createVideoElement('videos/Tutoriall.mp4', false);
        setTVScreen(videoElement);
        
        videoElement.addEventListener('ended', function onEnd() {
            videoElement.removeEventListener('ended', onEnd);
            // Cerrar la página
            showMessage('📼 Tutorial finalizado');
            setTimeout(() => {
                window.close();
                window.location.href = 'about:blank';
            }, 1000);
        });
        
        videoElement.play().catch(() => {});
    }
    
    // --- ANIMACIÓN DE CÁMARA ---
    function animateCameraTo(targetPos, targetLook, duration = 1.2) {
        cameraAnimating = true;
        camAnimTime = 0;
        camStartPos.copy(camera.position);
        camEndPos.copy(targetPos);
        camStartTarget.copy(getCameraTarget());
        camEndTarget.copy(targetLook);
        isReturning = false;
    }
    
    function getCameraTarget() {
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        return camera.position.clone().add(dir.multiplyScalar(2));
    }
    
    function startCameraReturn() {
        if (cameraAnimating) return;
        isReturning = true;
        cameraAnimating = true;
        camAnimTime = 0;
        camStartPos.copy(camera.position);
        camEndPos.set(0, 0.9, 3.2);
        camStartTarget.copy(getCameraTarget());
        camEndTarget.set(0, 0.35, -0.1);
    }
    
    function updateCameraAnimation(delta) {
        if (!cameraAnimating) return;
        
        camAnimTime += delta;
        const duration = isReturning ? 0.8 : 1.2;
        let progress = Math.min(camAnimTime / duration, 1);
        const ease = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
        
        camera.position.lerpVectors(camStartPos, camEndPos, ease);
        const target = new THREE.Vector3().lerpVectors(camStartTarget, camEndTarget, ease);
        camera.lookAt(target);
        
        if (progress >= 1) {
            cameraAnimating = false;
            if (isReturning) {
                isReturning = false;
                // Si no tiene VHS y no está en modo tutorial, mostrar crosshair
                if (!isWatching) {
                    crosshairEl.style.display = 'block';
                }
            }
        }
    }
    
    // ============================================================
    // INTERACCIÓN CON LA TV (CLICK)
    // ============================================================
    
    renderer.domElement.addEventListener('click', (e) => {
        if (cameraAnimating || isWatching) return;
        
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        
        raycaster.setFromCamera(pointer, camera);
        
        const tvMeshes = [];
        tvGroup.children.forEach(child => {
            if (child.isMesh) tvMeshes.push(child);
        });
        
        const tvIntersects = raycaster.intersectObjects(tvMeshes);
        if (tvIntersects.length > 0) {
            if (hasVHS) {
                // Tiene cinta -> reproducir Tutoriall.mp4
                showMessage('📼 Reproduciendo tutorial...');
                crosshairEl.style.display = 'none';
                isWatching = true;
                // Animar cámara hacia la TV
                animateCameraTo(
                    new THREE.Vector3(-0.35, 0.6, 1.3),
                    new THREE.Vector3(-0.35, 0.28, -0.1)
                );
                // Ocultar la cinta en la mano
                handVHSGroup.visible = false;
                setTimeout(() => {
                    playTutorial();
                }, 500);
            } else {
                // No tiene cinta -> reproducir NoIn.mp4
                showMessage('📺 Sin cinta');
                // Animar cámara hacia la TV
                animateCameraTo(
                    new THREE.Vector3(-0.35, 0.6, 1.3),
                    new THREE.Vector3(-0.35, 0.28, -0.1)
                );
                setTimeout(() => {
                    playNoIn();
                }, 500);
            }
        }
    });
    
    // ============================================================
    // INTERACCIÓN CON LA CINTA VHS
    // ============================================================
    
    renderer.domElement.addEventListener('click', (e) => {
        if (cameraAnimating || isWatching || hasVHS) return;
        
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        
        raycaster.setFromCamera(pointer, camera);
        
        const vhsMeshes = [];
        vhsGroup.children.forEach(child => {
            if (child.isMesh) vhsMeshes.push(child);
            child.children?.forEach(gc => {
                if (gc.isMesh) vhsMeshes.push(gc);
            });
        });
        
        const vhsIntersects = raycaster.intersectObjects(vhsMeshes);
        if (vhsIntersects.length > 0) {
            hasVHS = true;
            // Ocultar la cinta del suelo
            vhsGroup.visible = false;
            // Mostrar la cinta en la mano
            handVHSGroup.visible = true;
            showMessage('📼 Cinta VHS recogida');
        }
    });
    
    // ============================================================
    // INICIALIZAR
    // ============================================================
    
    // Iniciar con Screen.mp4 al cargar
    setTimeout(() => {
        playScreenLoop();
    }, 500);
    
    // ============================================================
    // LOOP PRINCIPAL
    // ============================================================
    
    const clock = new THREE.Clock();
    
    function animate() {
        const delta = clock.getDelta();
        
        // Actualizar animación de cámara
        if (cameraAnimating) {
            updateCameraAnimation(delta);
        } else {
            // Si no está animando, mantener posición
            if (!isWatching && !cameraAnimating) {
                camera.position.set(0, 0.9, 3.2);
                camera.lookAt(0, 0.35, -0.1);
            }
        }
        
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    
    animate();
    
    // --- RESIZE ---
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // --- KEYBOARD SHORTCUTS ---
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && isWatching) {
            isWatching = false;
            crosshairEl.style.display = 'block';
            if (videoElement) {
                videoElement.pause();
                videoElement.currentTime = 0;
            }
            playScreenLoop();
            if (hasVHS) {
                handVHSGroup.visible = true;
            }
            startCameraReturn();
        }
    });
    
    console.log('🎬 Amanda the Adventurer - VHS System');
    console.log('📼 Click en la TV o en la cinta VHS para interactuar');
  </script>
</body>
</html>
