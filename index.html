<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amanda the Adventurer</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0a0808; }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0808);
    
    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 20);
    camera.position.set(0, 0.9, 3.2);
    camera.lookAt(0, 0.35, -0.1);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);
    
    // Luces
    const ambient = new THREE.AmbientLight(0x222244, 0.15);
    scene.add(ambient);
    
    const spot = new THREE.SpotLight(0xffaa55, 2.0);
    spot.position.set(0, 2.8, -0.2);
    spot.angle = 0.5;
    spot.penumbra = 0.6;
    spot.decay = 1.2;
    spot.distance = 10;
    spot.castShadow = true;
    spot.shadow.mapSize.width = 2048;
    spot.shadow.mapSize.height = 2048;
    spot.shadow.bias = -0.002;
    scene.add(spot);
    
    const fill = new THREE.DirectionalLight(0x4488cc, 0.15);
    fill.position.set(-1, 0.5, 1);
    scene.add(fill);
    
    const rim = new THREE.DirectionalLight(0x446688, 0.1);
    rim.position.set(0, 0.5, -2);
    scene.add(rim);
    
    // Foco decorativo
    const cable = new THREE.Mesh(
      new THREE.CylinderGeometry(0.012, 0.012, 0.9, 6),
      new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 })
    );
    cable.position.set(0, 2.25, -0.2);
    scene.add(cable);
    
    const shade = new THREE.Mesh(
      new THREE.CylinderGeometry(0.12, 0.32, 0.28, 20),
      new THREE.MeshStandardMaterial({ 
        color: 0x222222, roughness: 0.3, metalness: 0.8,
        emissive: 0x1a0a00, emissiveIntensity: 0.05
      })
    );
    shade.position.set(0, 2.5, -0.2);
    shade.rotation.x = 0.08;
    scene.add(shade);
    
    const bulb = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 12, 12),
      new THREE.MeshStandardMaterial({ 
        color: 0xffaa44, emissive: 0xff8822, emissiveIntensity: 1.2,
        transparent: true, opacity: 0.95
      })
    );
    bulb.position.set(0, 2.35, -0.2);
    scene.add(bulb);
    
    function createGlow() {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      grad.addColorStop(0, 'rgba(255,200,120,1)');
      grad.addColorStop(0.2, 'rgba(255,180,80,0.8)');
      grad.addColorStop(0.6, 'rgba(255,140,40,0.3)');
      grad.addColorStop(1, 'rgba(255,80,20,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 128, 128);
      return canvas;
    }
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({
      map: new THREE.CanvasTexture(createGlow()),
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      opacity: 0.5
    }));
    glow.scale.set(1.2, 1.2, 1);
    glow.position.set(0, 2.35, -0.2);
    scene.add(glow);
    
    // Suelo
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 5),
      new THREE.MeshStandardMaterial({ color: 0x14100e, roughness: 0.9, metalness: 0.05 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.set(0, -0.05, -0.2);
    floor.receiveShadow = true;
    scene.add(floor);
    
    // Pared
    const wall = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 3.5),
      new THREE.MeshStandardMaterial({ color: 0x0d0a08, roughness: 0.95, metalness: 0 })
    );
    wall.position.set(0, 0.85, -2.0);
    wall.receiveShadow = true;
    scene.add(wall);
    
    // --- TV con pantalla tipo reproductor ---
    const tvGroup = new THREE.Group();
    tvGroup.position.set(-0.35, 0.28, -0.1);
    
    // Cuerpo de la TV
    const bodyMat = new THREE.MeshStandardMaterial({ 
      color: 0x181818, 
      roughness: 0.4, 
      metalness: 0.5 
    });
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.52, 0.2), bodyMat);
    body.position.z = 0.02;
    body.castShadow = true;
    body.receiveShadow = true;
    tvGroup.add(body);
    
    // Marco
    const frameMat = new THREE.MeshStandardMaterial({ 
      color: 0x222222, 
      roughness: 0.3, 
      metalness: 0.4 
    });
    const frame = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.45, 0.04), frameMat);
    frame.position.set(0, 0.01, 0.13);
    frame.castShadow = true;
    tvGroup.add(frame);
    
    // Pantalla (reproductor)
    const screenMat = new THREE.MeshStandardMaterial({ 
      color: 0x000000,
      roughness: 0.05,
      metalness: 0.95,
      side: THREE.DoubleSide,
      emissive: 0x000000,
      emissiveIntensity: 0
    });
    const screenMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.56, 0.39), screenMat);
    screenMesh.position.set(0, 0.01, 0.15);
    screenMesh.castShadow = false;
    tvGroup.add(screenMesh);
    
    // Brillo/reflejo de pantalla (efecto de vidrio)
    const glassMat = new THREE.MeshStandardMaterial({
      color: 0x88ccff,
      emissive: 0x4488ff,
      emissiveIntensity: 0.02,
      transparent: true,
      opacity: 0.08,
      roughness: 0.0,
      metalness: 1.0,
      side: THREE.DoubleSide
    });
    const glass = new THREE.Mesh(new THREE.PlaneGeometry(0.54, 0.37), glassMat);
    glass.position.set(0, 0.01, 0.16);
    tvGroup.add(glass);
    
    // Base
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5, metalness: 0.3 });
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.10, 0.14, 0.04, 16), baseMat);
    base.position.set(0, -0.28, 0.04);
    base.castShadow = true;
    base.receiveShadow = true;
    tvGroup.add(base);
    
    // Botones
    const btnMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.6 });
    for (let i = 0; i < 3; i++) {
      const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.02, 8), btnMat);
      btn.position.set(-0.24 + i * 0.06, -0.23, 0.14);
      btn.rotation.x = Math.PI / 2;
      tvGroup.add(btn);
    }
    
    // LEDs indicadores
    const ledMat = new THREE.MeshStandardMaterial({
      color: 0x00ff44,
      emissive: 0x00ff44,
      emissiveIntensity: 0.3
    });
    const led = new THREE.Mesh(new THREE.SphereGeometry(0.012, 8, 8), ledMat);
    led.position.set(0.22, -0.22, 0.14);
    tvGroup.add(led);
    
    scene.add(tvGroup);
    
    // --- Cinta VHS ---
    const cintaGroup = new THREE.Group();
    cintaGroup.position.set(0.7, 0.05, 0.08);
    scene.add(cintaGroup);
    
    const loader = new GLTFLoader();
    let cintaModel = null;
    let modeloCargado = false;
    
    loader.load(
      'vhs_tape.glb',
      (gltf) => {
        cintaModel = gltf.scene;
        cintaModel.scale.set(1.8, 1.8, 1.8);
        cintaModel.position.set(0, 0, 0);
        cintaModel.castShadow = true;
        cintaModel.receiveShadow = true;
        cintaGroup.add(cintaModel);
        modeloCargado = true;
        console.log('✅ Modelo VHS cargado');
      },
      undefined,
      () => {
        console.warn('⚠️ Usando modelo alternativo');
        crearModeloAlternativo();
      }
    );
    
    function crearModeloAlternativo() {
      const altMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.6, metalness: 0.1 });
      const altBody = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.45, 0.22), altMat);
      altBody.position.y = 0.22;
      altBody.castShadow = true;
      altBody.receiveShadow = true;
      cintaGroup.add(altBody);
      
      const labelMat = new THREE.MeshStandardMaterial({ color: 0x8a6e4b, roughness: 0.8 });
      const label = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.28, 0.02), labelMat);
      label.position.set(0, 0.22, 0.12);
      cintaGroup.add(label);
    }
    
    // --- REPRODUCTOR DE VIDEO (similar a NoTeRias) ---
    class VideoPlayer {
      constructor() {
        this.video = null;
        this.texture = null;
        this.isPlaying = false;
        this.currentSrc = '';
        this.onEnded = null;
        this.onError = null;
      }
      
      createVideo(src, loop = false) {
        const v = document.createElement('video');
        v.src = src;
        v.loop = loop;
        v.muted = true;
        v.playsInline = true;
        v.crossOrigin = 'anonymous';
        v.preload = 'auto';
        v.style.display = 'none';
        document.body.appendChild(v);
        
        v.addEventListener('ended', () => {
          if (this.onEnded) this.onEnded();
        });
        
        v.addEventListener('error', (e) => {
          console.warn('Error en video:', src, e);
          if (this.onError) this.onError(e);
        });
        
        return v;
      }
      
      load(src, loop = false) {
        if (this.video && this.video !== this.video) {
          this.video.pause();
          this.video.currentTime = 0;
        }
        
        this.video = this.createVideo(src, loop);
        this.currentSrc = src;
        this.isPlaying = false;
        
        // Crear textura
        this.texture = new THREE.VideoTexture(this.video);
        this.texture.minFilter = THREE.LinearFilter;
        this.texture.magFilter = THREE.LinearFilter;
        this.texture.format = THREE.RGBAFormat;
        
        return this.texture;
      }
      
      play() {
        if (!this.video) return;
        this.video.play().then(() => {
          this.isPlaying = true;
          console.log('▶️ Reproduciendo:', this.currentSrc);
        }).catch((e) => {
          console.warn('⚠️ Error al reproducir:', e);
          // Intentar con interacción del usuario
          const playOnClick = () => {
            this.video.play().catch(() => {});
            document.removeEventListener('click', playOnClick);
          };
          document.addEventListener('click', playOnClick, { once: true });
        });
      }
      
      pause() {
        if (this.video && this.isPlaying) {
          this.video.pause();
          this.isPlaying = false;
        }
      }
      
      stop() {
        if (this.video) {
          this.video.pause();
          this.video.currentTime = 0;
          this.isPlaying = false;
        }
      }
      
      getTexture() {
        return this.texture;
      }
      
      getVideo() {
        return this.video;
      }
      
      isEnded() {
        return this.video && this.video.ended;
      }
      
      setOnEnded(callback) {
        this.onEnded = callback;
      }
      
      setOnError(callback) {
        this.onError = callback;
      }
    }
    
    // Crear reproductor
    const player = new VideoPlayer();
    
    // Cargar video inicial (Screen.mp4)
    const texScreen = player.load('videos/Screen.mp4', true);
    screenMesh.material.map = texScreen;
    screenMesh.material.needsUpdate = true;
    player.play();
    
    // Función para cambiar video en el reproductor
    function reproducirVideo(src, loop = false, callback = null) {
      const tex = player.load(src, loop);
      screenMesh.material.map = tex;
      screenMesh.material.needsUpdate = true;
      
      if (callback) {
        player.setOnEnded(callback);
      }
      
      player.play();
    }
    
    // --- Estado de la escena ---
    let animando = false;
    let tiempoAnim = 0;
    let tiempoCintaVisible = 0;
    let cintaDesaparecida = false;
    let tipoAnimacion = null;
    let esperandoFinVideo = false;
    
    const camIni = new THREE.Vector3(0, 0.9, 3.2);
    const objIni = new THREE.Vector3(0, 0.35, -0.1);
    let camObj = new THREE.Vector3();
    let objObj = new THREE.Vector3();
    const cintaPosIni = new THREE.Vector3(0.7, 0.05, 0.08);
    const cintaPosFin = new THREE.Vector3(-0.15, 0.28, 0.08);
    
    // --- Animaciones ---
    function animTV() {
      if (animando) return;
      animando = true;
      tiempoAnim = 0;
      tipoAnimacion = 'tv';
      esperandoFinVideo = false;
      camObj.set(-0.35, 0.6, 1.3);
      objObj.set(-0.35, 0.28, -0.1);
      
      reproducirVideo('videos/NoIn.mp4', false, () => {
        esperandoFinVideo = true;
      });
      
      cintaGroup.visible = true;
      cintaDesaparecida = false;
    }
    
    function animCinta() {
      if (animando) return;
      animando = true;
      tiempoAnim = 0;
      tiempoCintaVisible = 0;
      tipoAnimacion = 'cinta';
      esperandoFinVideo = false;
      cintaGroup.position.copy(cintaPosIni);
      cintaGroup.visible = true;
      cintaDesaparecida = false;
      camObj.set(-0.35, 0.6, 1.1);
      objObj.set(-0.35, 0.28, -0.1);
      
      reproducirVideo('videos/Tutoriall.mp4', false, () => {
        // Cerrar página cuando termine Tutoriall.mp4
        window.close();
        setTimeout(() => { window.location.href = 'about:blank'; }, 300);
      });
    }
    
    function actualizarAnim(delta) {
      if (!animando) return;
      
      tiempoAnim += delta;
      const dur = 1.2;
      let prog = Math.min(tiempoAnim / dur, 1);
      const ease = prog < 0.5 ? 2 * prog * prog : 1 - Math.pow(-2 * prog + 2, 2) / 2;
      
      if (tipoAnimacion === 'tv') {
        if (prog < 1) {
          camera.position.lerpVectors(camIni, camObj, ease);
          const target = new THREE.Vector3().lerpVectors(objIni, objObj, ease);
          camera.lookAt(target);
        } else {
          camera.position.copy(camObj);
          camera.lookAt(objObj);
          
          if (esperandoFinVideo && player.isEnded()) {
            regresarCamara();
          }
        }
      } else if (tipoAnimacion === 'cinta') {
        if (prog < 1) {
          const posCinta = new THREE.Vector3().lerpVectors(cintaPosIni, cintaPosFin, ease);
          cintaGroup.position.copy(posCinta);
          if (cintaModel && modeloCargado) {
            cintaModel.rotation.y = ease * 0.4;
          } else {
            cintaGroup.rotation.y = ease * 0.4;
          }
          
          camera.position.lerpVectors(camIni, camObj, ease);
          const target = new THREE.Vector3().lerpVectors(objIni, objObj, ease);
          camera.lookAt(target);
        } else {
          cintaGroup.position.copy(cintaPosFin);
          if (cintaModel && modeloCargado) {
            cintaModel.rotation.y = 0.4;
          } else {
            cintaGroup.rotation.y = 0.4;
          }
          camera.position.copy(camObj);
          camera.lookAt(objObj);
          
          if (!cintaDesaparecida) {
            tiempoCintaVisible += delta;
            if (tiempoCintaVisible >= 1.0) {
              cintaGroup.visible = false;
              cintaDesaparecida = true;
            }
          }
          
          if (player.isEnded()) {
            // El callback de onEnded ya maneja el cierre
          }
        }
      }
    }
    
    function regresarCamara() {
      const posIni = camera.position.clone();
      const targetIni = new THREE.Vector3(0, 0.35, -0.1);
      const posFin = camIni.clone();
      const targetFin = objIni.clone();
      
      let tiempo = 0;
      const dur = 0.8;
      
      function animar() {
        tiempo += 0.02;
        let p = Math.min(tiempo / dur, 1);
        const ease = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
        camera.position.lerpVectors(posIni, posFin, ease);
        const target = new THREE.Vector3().lerpVectors(targetIni, targetFin, ease);
        camera.lookAt(target);
        
        if (p < 1) {
          requestAnimationFrame(animar);
        } else {
          camera.position.copy(posFin);
          camera.lookAt(targetFin);
          animando = false;
          tipoAnimacion = null;
          esperandoFinVideo = false;
          
          // Volver a Screen.mp4
          reproducirVideo('videos/Screen.mp4', true);
          
          cintaGroup.position.copy(cintaPosIni);
          if (cintaModel && modeloCargado) {
            cintaModel.rotation.y = 0;
          } else {
            cintaGroup.rotation.y = 0;
          }
          cintaGroup.visible = true;
          cintaDesaparecida = false;
        }
      }
      animar();
    }
    
    // --- Interacción ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    
    function onClick(event) {
      if (animando) return;
      
      mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
      mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      
      const tvMeshes = [];
      tvGroup.children.forEach(child => {
        if (child.isMesh) tvMeshes.push(child);
      });
      
      const cintaMeshes = [];
      cintaGroup.children.forEach(child => {
        if (child.isMesh) cintaMeshes.push(child);
        child.children?.forEach(gc => {
          if (gc.isMesh) cintaMeshes.push(gc);
        });
      });
      
      const all = [...tvMeshes, ...cintaMeshes];
      const hits = raycaster.intersectObjects(all);
      
      if (hits.length > 0) {
        let esTV = false;
        let esCinta = false;
        let obj = hits[0].object;
        while (obj) {
          if (obj === tvGroup) { esTV = true; break; }
          if (obj === cintaGroup) { esCinta = true; break; }
          obj = obj.parent;
        }
        
        if (esTV) {
          animTV();
        } else if (esCinta) {
          animCinta();
        }
      }
    }
    
    window.addEventListener('click', onClick);
    
    // --- Loop ---
    const clock = new THREE.Clock();
    
    function animate() {
      const delta = clock.getDelta();
      
      if (animando) {
        actualizarAnim(delta);
      } else {
        camera.position.copy(camIni);
        camera.lookAt(objIni);
      }
      
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    
    animate();
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
