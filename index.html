<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amanda the Adventurer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #0a0808; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    /* ===== MENÚ 2D ===== */
    #menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #1a1210 0%, #0a0808 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    #menu.hidden {
      opacity: 0;
      transform: scale(1.1);
      pointer-events: none;
    }
    #menu h1 {
      font-size: 72px;
      color: #f0d6b0;
      text-shadow: 0 0 60px rgba(255,180,100,0.15), 0 4px 30px rgba(0,0,0,0.8);
      letter-spacing: 8px;
      font-weight: 300;
      margin-bottom: 10px;
    }
    #menu .subtitle {
      color: rgba(255,215,150,0.4);
      font-size: 16px;
      letter-spacing: 12px;
      text-transform: uppercase;
      margin-bottom: 50px;
    }
    #menu .vhs-icon {
      font-size: 80px;
      margin-bottom: 30px;
      opacity: 0.6;
      filter: drop-shadow(0 0 40px rgba(255,180,100,0.1));
    }
    #btnStart {
      background: transparent;
      border: 1px solid rgba(255,215,150,0.3);
      color: #f0d6b0;
      padding: 16px 60px;
      font-size: 18px;
      letter-spacing: 6px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.4s ease;
      border-radius: 4px;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }
    #btnStart:hover {
      background: rgba(255,215,150,0.08);
      border-color: rgba(255,215,150,0.6);
      box-shadow: 0 0 40px rgba(255,180,100,0.05);
      transform: scale(1.02);
    }
    #btnStart::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,215,150,0.03) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    #btnStart:hover::after { opacity: 1; }
    #menu .footer {
      position: absolute;
      bottom: 40px;
      color: rgba(255,215,150,0.1);
      font-size: 11px;
      letter-spacing: 4px;
    }
    
    /* ===== CROSSHAIR ===== */
    #vhsCrosshair {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,215,150,0.25);
      font-size: 12px;
      letter-spacing: 3px;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 0 20px rgba(255,215,150,0.03);
      display: none;
      font-family: 'Segoe UI', sans-serif;
    }
    #vhsCrosshair span {
      display: inline-block;
      background: rgba(0,0,0,0.3);
      padding: 6px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,215,150,0.04);
    }
    
    /* ===== LOADING ===== */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0808;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      color: rgba(255,215,150,0.3);
      font-size: 14px;
      letter-spacing: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #loading.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- ===== MENÚ 2D ===== -->
  <div id="menu">
    <div class="vhs-icon">📼</div>
    <h1>AMANDA</h1>
    <div class="subtitle">The Adventurer</div>
    <button id="btnStart">▶ EMPEZAR</button>
    <div class="footer">VHS · 1998</div>
  </div>

  <!-- ===== LOADING ===== -->
  <div id="loading">CARGANDO...</div>

  <!-- ===== CROSSHAIR ===== -->
  <div id="vhsCrosshair"><span>📼 CLICK EN TV O CINTA</span></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    
    // ============================================================
    // UI
    // ============================================================
    const menuEl = document.getElementById('menu');
    const btnStart = document.getElementById('btnStart');
    const crosshairEl = document.getElementById('vhsCrosshair');
    const loadingEl = document.getElementById('loading');
    
    let juegoIniciado = false;
    let scene3D = null;
    let camera3D = null;
    let renderer3D = null;
    let clock3D = null;
    let animateId = null;
    
    // ============================================================
    // FUNCIÓN PARA INICIALIZAR EL 3D
    // ============================================================
    function iniciarJuego() {
      if (juegoIniciado) return;
      juegoIniciado = true;
      
      // Ocultar menú
      menuEl.classList.add('hidden');
      
      // Mostrar loading
      loadingEl.classList.add('visible');
      
      // Iniciar 3D con un pequeño delay
      setTimeout(() => {
        iniciarEscena3D();
        loadingEl.classList.remove('visible');
        crosshairEl.style.display = 'block';
        // Iniciar Screen.mp4
        setTimeout(() => {
          playScreenLoop();
        }, 300);
      }, 400);
    }
    
    btnStart.addEventListener('click', iniciarJuego);
    
    // ============================================================
    // ESCENA 3D
    // ============================================================
    function iniciarEscena3D() {
      // --- ESCENA ---
      scene3D = new THREE.Scene();
      scene3D.background = new THREE.Color(0x0a0808);
      
      // --- CÁMARA ---
      camera3D = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 20);
      camera3D.position.set(0, 0.9, 3.2);
      camera3D.lookAt(0, 0.35, -0.1);
      
      // --- RENDERER ---
      renderer3D = new THREE.WebGLRenderer({ antialias: true });
      renderer3D.setSize(window.innerWidth, window.innerHeight);
      renderer3D.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer3D.shadowMap.enabled = true;
      renderer3D.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer3D.toneMapping = THREE.ACESFilmicToneMapping;
      renderer3D.toneMappingExposure = 1.2;
      document.body.appendChild(renderer3D.domElement);
      
      // --- RAYCASTER ---
      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      
      // ============================================================
      // LUCES
      // ============================================================
      const ambient = new THREE.AmbientLight(0x222244, 0.15);
      scene3D.add(ambient);
      
      const spot = new THREE.SpotLight(0xffaa55, 2.0);
      spot.position.set(0, 2.8, -0.2);
      spot.angle = 0.5;
      spot.penumbra = 0.6;
      spot.decay = 1.2;
      spot.distance = 10;
      spot.castShadow = true;
      spot.shadow.mapSize.width = 2048;
      spot.shadow.mapSize.height = 2048;
      spot.shadow.bias = -0.002;
      scene3D.add(spot);
      
      const fill = new THREE.DirectionalLight(0x4488cc, 0.15);
      fill.position.set(-1, 0.5, 1);
      scene3D.add(fill);
      
      const rim = new THREE.DirectionalLight(0x446688, 0.1);
      rim.position.set(0, 0.5, -2);
      scene3D.add(rim);
      
      // ============================================================
      // FOCO DECORATIVO
      // ============================================================
      const cable = new THREE.Mesh(
        new THREE.CylinderGeometry(0.012, 0.012, 0.9, 6),
        new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 })
      );
      cable.position.set(0, 2.25, -0.2);
      scene3D.add(cable);
      
      const shade = new THREE.Mesh(
        new THREE.CylinderGeometry(0.12, 0.32, 0.28, 20),
        new THREE.MeshStandardMaterial({ 
          color: 0x222222, roughness: 0.3, metalness: 0.8,
          emissive: 0x1a0a00, emissiveIntensity: 0.05
        })
      );
      shade.position.set(0, 2.5, -0.2);
      shade.rotation.x = 0.08;
      scene3D.add(shade);
      
      const bulb = new THREE.Mesh(
        new THREE.SphereGeometry(0.05, 12, 12),
        new THREE.MeshStandardMaterial({ 
          color: 0xffaa44, emissive: 0xff8822, emissiveIntensity: 1.2,
          transparent: true, opacity: 0.95
        })
      );
      bulb.position.set(0, 2.35, -0.2);
      scene3D.add(bulb);
      
      function createGlow() {
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
        grad.addColorStop(0, 'rgba(255,200,120,1)');
        grad.addColorStop(0.2, 'rgba(255,180,80,0.8)');
        grad.addColorStop(0.6, 'rgba(255,140,40,0.3)');
        grad.addColorStop(1, 'rgba(255,80,20,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 128, 128);
        return canvas;
      }
      const glow = new THREE.Sprite(new THREE.SpriteMaterial({
        map: new THREE.CanvasTexture(createGlow()),
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        opacity: 0.5
      }));
      glow.scale.set(1.2, 1.2, 1);
      glow.position.set(0, 2.35, -0.2);
      scene3D.add(glow);
      
      // ============================================================
      // SUELO Y PARED
      // ============================================================
      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(6, 5),
        new THREE.MeshStandardMaterial({ color: 0x14100e, roughness: 0.9, metalness: 0.05 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.set(0, -0.05, -0.2);
      floor.receiveShadow = true;
      scene3D.add(floor);
      
      const wall = new THREE.Mesh(
        new THREE.PlaneGeometry(6, 3.5),
        new THREE.MeshStandardMaterial({ color: 0x0d0a08, roughness: 0.95, metalness: 0 })
      );
      wall.position.set(0, 0.85, -2.0);
      wall.receiveShadow = true;
      scene3D.add(wall);
      
      // ============================================================
      // TV MEJORADA CON PANTALLA AZUL
      // ============================================================
      const tvGroup = new THREE.Group();
      tvGroup.position.set(-0.35, 0.28, -0.1);
      
      const bodyMat = new THREE.MeshStandardMaterial({ 
        color: 0x1a1a1a, roughness: 0.3, metalness: 0.6 
      });
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.56, 0.22), bodyMat);
      body.position.z = 0.02;
      body.castShadow = true;
      body.receiveShadow = true;
      tvGroup.add(body);
      
      const frameMat = new THREE.MeshStandardMaterial({ 
        color: 0x222222, roughness: 0.2, metalness: 0.5 
      });
      const frame = new THREE.Mesh(new THREE.BoxGeometry(0.66, 0.48, 0.05), frameMat);
      frame.position.set(0, 0.01, 0.13);
      frame.castShadow = true;
      tvGroup.add(frame);
      
      // Pantalla AZUL para transmisión de video
      const screenMat = new THREE.MeshStandardMaterial({ 
        color: 0x0000ff,
        emissive: 0x0044ff,
        emissiveIntensity: 0.15,
        roughness: 0.05,
        metalness: 0.9,
        side: THREE.DoubleSide
      });
      const tvScreen = new THREE.Mesh(new THREE.PlaneGeometry(0.58, 0.40), screenMat);
      tvScreen.position.set(0, 0.01, 0.155);
      tvScreen.castShadow = false;
      tvGroup.add(tvScreen);
      
      // Efecto vidrio
      const glassMat = new THREE.MeshStandardMaterial({
        color: 0x88ccff,
        emissive: 0x4488ff,
        emissiveIntensity: 0.03,
        transparent: true,
        opacity: 0.08,
        roughness: 0.0,
        metalness: 1.0,
        side: THREE.DoubleSide
      });
      const glass = new THREE.Mesh(new THREE.PlaneGeometry(0.56, 0.38), glassMat);
      glass.position.set(0, 0.01, 0.165);
      tvGroup.add(glass);
      
      // Luz TV
      const tvLight = new THREE.PointLight(0x4488ff, 0.3, 1.5);
      tvLight.position.set(0, 0.01, 0.4);
      tvGroup.add(tvLight);
      
      const baseMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.4, metalness: 0.3 });
      const base = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.16, 0.05, 20), baseMat);
      base.position.set(0, -0.30, 0.04);
      base.castShadow = true;
      base.receiveShadow = true;
      tvGroup.add(base);
      
      const btnMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5 });
      for (let i = 0; i < 3; i++) {
        const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.015, 8), btnMat);
        btn.position.set(-0.25 + i * 0.06, -0.24, 0.145);
        btn.rotation.x = Math.PI / 2;
        tvGroup.add(btn);
      }
      
      const ledMat = new THREE.MeshStandardMaterial({
        color: 0x00ff44,
        emissive: 0x00ff44,
        emissiveIntensity: 0.4
      });
      const led = new THREE.Mesh(new THREE.SphereGeometry(0.01, 8, 8), ledMat);
      led.position.set(0.26, -0.24, 0.145);
      tvGroup.add(led);
      
      scene3D.add(tvGroup);
      
      // ============================================================
      // CINTA VHS
      // ============================================================
      const vhsGroup = new THREE.Group();
      vhsGroup.position.set(0.7, 0.05, 0.08);
      scene3D.add(vhsGroup);
      
      const loader = new GLTFLoader();
      let vhsModel = null;
      
      loader.load(
        'vhs_tape.glb',
        (gltf) => {
          vhsModel = gltf.scene;
          vhsModel.scale.set(1.8, 1.8, 1.8);
          vhsModel.position.set(0, 0, 0);
          vhsModel.castShadow = true;
          vhsModel.receiveShadow = true;
          vhsGroup.add(vhsModel);
          console.log('✅ Modelo VHS cargado');
        },
        undefined,
        () => {
          const altMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.6, metalness: 0.1 });
          const altBody = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.45, 0.22), altMat);
          altBody.position.y = 0.22;
          altBody.castShadow = true;
          altBody.receiveShadow = true;
          vhsGroup.add(altBody);
        }
      );
      
      // Cinta en mano
      const handVHSGroup = new THREE.Group();
      handVHSGroup.position.set(0.35, 0.2, 0.35);
      handVHSGroup.visible = false;
      scene3D.add(handVHSGroup);
      
      loader.load(
        'vhs_tape.glb',
        (gltf) => {
          const handModel = gltf.scene;
          handModel.scale.set(1.2, 1.2, 1.2);
          handModel.position.set(0, 0, 0);
          handModel.rotation.x = -0.3;
          handModel.rotation.z = 0.2;
          handVHSGroup.add(handModel);
        },
        undefined,
        () => {
          const altMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.6, metalness: 0.1 });
          const altBody = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.35, 0.18), altMat);
          altBody.position.y = 0.18;
          handVHSGroup.add(altBody);
        }
      );
      
      // ============================================================
      // SISTEMA DE VIDEO
      // ============================================================
      
      let videoElement = null;
      let videoTexture = null;
      let isPlaying = false;
      let isWatching = false;
      let hasVHS = false;
      let cameraAnimating = false;
      let camAnimTime = 0;
      let camStartPos = new THREE.Vector3();
      let camEndPos = new THREE.Vector3();
      let camStartTarget = new THREE.Vector3();
      let camEndTarget = new THREE.Vector3();
      let isReturning = false;
      let animacionCintaActiva = false;
      let tiempoCintaAnim = 0;
      let cintaPosFinal = new THREE.Vector3(-0.15, 0.28, 0.08);
      let cintaDesaparecida = false;
      let cameraAnimating_callback = null;
      
      // Crear video
      function createVideoElement(src, loop = true) {
        const video = document.createElement('video');
        video.src = src;
        video.crossOrigin = 'anonymous';
        video.playsInline = true;
        video.muted = false;
        video.loop = loop;
        video.volume = 0.5;
        video.style.display = 'none';
        video.preload = 'auto';
        document.body.appendChild(video);
        return video;
      }
      
      // Aplicar video a la pantalla
      function setTVScreen(video) {
        if (videoTexture) {
          videoTexture.dispose();
        }
        videoTexture = new THREE.VideoTexture(video);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;
        videoTexture.format = THREE.RGBAFormat;
      
        tvScreen.material = new THREE.MeshStandardMaterial({
          map: videoTexture,
          emissive: new THREE.Color(0x4488ff),
          emissiveIntensity: 0.35,
          roughness: 0.1,
          metalness: 0.9,
          side: THREE.DoubleSide
        });
        tvScreen.material.needsUpdate = true;
      
        tvLight.intensity = 1.5;
        isPlaying = true;
      }
      
      // Screen.mp4 - loop
      function playScreenLoop() {
        if (videoElement) {
          videoElement.pause();
          videoElement.currentTime = 0;
          videoElement = null;
        }
        videoElement = createVideoElement('videos/Screen.mp4', true);
        setTVScreen(videoElement);
        videoElement.play().catch(() => console.log('Error en Screen.mp4'));
        crosshairEl.style.display = 'block';
      }
      
      // NoIn.mp4
      function playNoIn() {
        if (videoElement) {
          videoElement.pause();
          videoElement.currentTime = 0;
          videoElement = null;
        }
        videoElement = createVideoElement('videos/NoIn.mp4', false);
        setTVScreen(videoElement);
        
        videoElement.addEventListener('ended', function onEnd() {
          videoElement.removeEventListener('ended', onEnd);
          startCameraReturn();
          setTimeout(() => playScreenLoop(), 300);
        });
        
        videoElement.play().catch(() => { startCameraReturn(); playScreenLoop(); });
      }
      
      // Tutoriall.mp4
      function playTutorial() {
        if (videoElement) {
          videoElement.pause();
          videoElement.currentTime = 0;
          videoElement = null;
        }
        videoElement = createVideoElement('videos/Tutoriall.mp4', false);
        setTVScreen(videoElement);
        
        videoElement.addEventListener('ended', function onEnd() {
          videoElement.removeEventListener('ended', onEnd);
          // Cerrar página al terminar Tutoriall.mp4
          setTimeout(() => {
            window.close();
            window.location.href = 'about:blank';
          }, 500);
        });
        
        videoElement.play().catch(() => {});
      }
      
      // ============================================================
      // ANIMACIONES DE CÁMARA
      // ============================================================
      
      function animateCameraTo(targetPos, targetLook, duration = 1.2, callback = null) {
        cameraAnimating = true;
        camAnimTime = 0;
        camStartPos.copy(camera3D.position);
        camEndPos.copy(targetPos);
        camStartTarget.copy(getCameraTarget());
        camEndTarget.copy(targetLook);
        isReturning = false;
        cameraAnimating_callback = callback || null;
      }
      
      function getCameraTarget() {
        const dir = new THREE.Vector3();
        camera3D.getWorldDirection(dir);
        return camera3D.position.clone().add(dir.multiplyScalar(2));
      }
      
      function startCameraReturn() {
        if (cameraAnimating) return;
        isReturning = true;
        cameraAnimating = true;
        camAnimTime = 0;
        camStartPos.copy(camera3D.position);
        camEndPos.set(0, 0.9, 3.2);
        camStartTarget.copy(getCameraTarget());
        camEndTarget.set(0, 0.35, -0.1);
        cameraAnimating_callback = null;
      }
      
      function updateCameraAnimation(delta) {
        if (!cameraAnimating) return;
        camAnimTime += delta;
        const duration = isReturning ? 0.8 : 1.2;
        let progress = Math.min(camAnimTime / duration, 1);
        const ease = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
        camera3D.position.lerpVectors(camStartPos, camEndPos, ease);
        const target = new THREE.Vector3().lerpVectors(camStartTarget, camEndTarget, ease);
        camera3D.lookAt(target);
        if (progress >= 1) {
          cameraAnimating = false;
          if (isReturning) {
            isReturning = false;
            if (!isWatching) crosshairEl.style.display = 'block';
          }
          if (cameraAnimating_callback) {
            const cb = cameraAnimating_callback;
            cameraAnimating_callback = null;
            cb();
          }
        }
      }
      
      // ============================================================
      // ANIMACIÓN CINTA
      // ============================================================
      
      function iniciarAnimacionCinta() {
        if (animacionCintaActiva || !hasVHS) return;
        if (isWatching) return;
        animacionCintaActiva = true;
        tiempoCintaAnim = 0;
        cintaDesaparecida = false;
        handVHSGroup.visible = false;
        vhsGroup.visible = true;
        vhsGroup.position.set(0.35, 0.2, 0.35);
        vhsGroup.rotation.y = 0;
      }
      
      function actualizarAnimacionCinta(delta) {
        if (!animacionCintaActiva) return;
        tiempoCintaAnim += delta;
        const duracion = 1.2;
        let progreso = Math.min(tiempoCintaAnim / duracion, 1);
        const ease = progreso < 0.5 ? 2 * progreso * progreso : 1 - Math.pow(-2 * progreso + 2, 2) / 2;
        
        if (progreso < 1) {
          const posCinta = new THREE.Vector3().lerpVectors(
            new THREE.Vector3(0.35, 0.2, 0.35),
            cintaPosFinal,
            ease
          );
          vhsGroup.position.copy(posCinta);
          vhsGroup.rotation.y = ease * 0.4;
        } else {
          vhsGroup.position.copy(cintaPosFinal);
          vhsGroup.rotation.y = 0.4;
          if (!cintaDesaparecida) {
            setTimeout(() => {
              vhsGroup.visible = false;
              cintaDesaparecida = true;
              isWatching = true;
              crosshairEl.style.display = 'none';
              playTutorial();
              animacionCintaActiva = false;
            }, 500);
          }
        }
      }
      
      // ============================================================
      // INTERACCIONES
      // ============================================================
      
      // Click en TV
      renderer3D.domElement.addEventListener('click', (e) => {
        if (!juegoIniciado) return;
        if (cameraAnimating || isWatching || animacionCintaActiva) return;
        
        const rect = renderer3D.domElement.getBoundingClientRect();
        pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera3D);
        
        const tvMeshes = [];
        tvGroup.children.forEach(child => {
          if (child.isMesh) tvMeshes.push(child);
        });
        
        if (raycaster.intersectObjects(tvMeshes).length > 0) {
          crosshairEl.style.display = 'none';
          if (hasVHS) {
            animateCameraTo(
              new THREE.Vector3(-0.35, 0.6, 1.3),
              new THREE.Vector3(-0.35, 0.28, -0.1),
              1.2,
              () => {
                setTimeout(() => iniciarAnimacionCinta(), 300);
              }
            );
          } else {
            animateCameraTo(
              new THREE.Vector3(-0.35, 0.6, 1.3),
              new THREE.Vector3(-0.35, 0.28, -0.1),
              1.2,
              () => {
                setTimeout(() => playNoIn(), 300);
              }
            );
          }
        }
      });
      
      // Click en cinta (recoger)
      renderer3D.domElement.addEventListener('click', (e) => {
        if (!juegoIniciado) return;
        if (cameraAnimating || isWatching || hasVHS || animacionCintaActiva) return;
        
        const rect = renderer3D.domElement.getBoundingClientRect();
        pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera3D);
        
        const vhsMeshes = [];
        vhsGroup.children.forEach(child => {
          if (child.isMesh) vhsMeshes.push(child);
          child.children?.forEach(gc => {
            if (gc.isMesh) vhsMeshes.push(gc);
          });
        });
        
        if (raycaster.intersectObjects(vhsMeshes).length > 0) {
          hasVHS = true;
          vhsGroup.visible = false;
          handVHSGroup.visible = true;
        }
      });
      
      // ESC para salir
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && isWatching) {
          isWatching = false;
          crosshairEl.style.display = 'block';
          if (videoElement) {
            videoElement.pause();
            videoElement.currentTime = 0;
          }
          startCameraReturn();
          setTimeout(() => playScreenLoop(), 300);
          if (hasVHS) handVHSGroup.visible = true;
          animacionCintaActiva = false;
          vhsGroup.visible = true;
          vhsGroup.position.set(0.7, 0.05, 0.08);
        }
      });
      
      // ============================================================
      // LOOP PRINCIPAL
      // ============================================================
      
      clock3D = new THREE.Clock();
      
      function animate() {
        const delta = clock3D.getDelta();
        if (cameraAnimating) {
          updateCameraAnimation(delta);
        } else if (animacionCintaActiva) {
          actualizarAnimacionCinta(delta);
        } else if (!isWatching && !cameraAnimating && juegoIniciado) {
          camera3D.position.set(0, 0.9, 3.2);
          camera3D.lookAt(0, 0.35, -0.1);
        }
        renderer3D.render(scene3D, camera3D);
        animateId = requestAnimationFrame(animate);
      }
      
      animate();
      
      window.addEventListener('resize', () => {
        if (camera3D && renderer3D) {
          camera3D.aspect = window.innerWidth / window.innerHeight;
          camera3D.updateProjectionMatrix();
          renderer3D.setSize(window.innerWidth, window.innerHeight);
        }
      });
    }
    
    console.log('🎬 Amanda the Adventurer - Presiona EMPEZAR');
  </script>
</body>
</html>
